name: Feature request
description: Suggest a new capability for Remote Claude.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the workflow pain or missing capability — not the solution yet.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: One or more options. Tradeoffs welcome.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
